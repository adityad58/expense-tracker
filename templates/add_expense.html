{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">

    <div class="auth-header">
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">Naya expense record karo</p>
    </div>

    <div class="auth-card">
      {% if error %}
        <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" name="title" class="form-input"
                 placeholder="e.g. Grocery Shopping" required autofocus>
        </div>

        <div class="form-group">
          <label for="amount">Amount (₹) *</label>
          <input type="number" id="amount" name="amount" class="form-input"
                 placeholder="e.g. 500" step="0.01" min="0.01" required>
        </div>

        <div class="form-group">
          <label for="category">Category *</label>
          <select id="category" name="category" class="form-input" required>
            <option value="">-- Category chunno --</option>
            {% for cat in categories %}
              <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date *</label>
          <input type="date" id="date" name="date" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="description">Description (optional)</label>
          <input type="text" id="description" name="description" class="form-input"
                 placeholder="Short note...">
        </div>

        <button type="submit" class="btn-submit">Add Expense</button>
      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('dashboard') }}">← Dashboard pe wapis jao</a>
    </p>

  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  // Aaj ki date auto-fill
  document.getElementById("date").valueAsDate = new Date();
</script>
{% endblock %}
