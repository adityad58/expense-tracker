{% extends "base.html" %}
{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">

    <div class="auth-header">
      <h1 class="auth-title">Edit Expense</h1>
      <p class="auth-subtitle">Expense update karo</p>
    </div>

    <div class="auth-card">
      {% if error %}
        <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">

        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" name="title" class="form-input"
                 value="{{ expense.title }}" required>
        </div>

        <div class="form-group">
          <label for="amount">Amount (₹) *</label>
          <input type="number" id="amount" name="amount" class="form-input"
                 value="{{ expense.amount }}" step="0.01" min="0.01" required>
        </div>

        <div class="form-group">
          <label for="category">Category *</label>
          <select id="category" name="category" class="form-input" required>
            {% for cat in categories %}
              <option value="{{ cat }}" {% if expense.category == cat %}selected{% endif %}>
                {{ cat }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date *</label>
          <input type="date" id="date" name="date" class="form-input"
                 value="{{ expense.date }}" required>
        </div>

        <div class="form-group">
          <label for="description">Description (optional)</label>
          <input type="text" id="description" name="description" class="form-input"
                 value="{{ expense.description or '' }}">
        </div>

        <button type="submit" class="btn-submit">Update Expense</button>
      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('dashboard') }}">← Dashboard pe wapis jao</a>
    </p>

  </div>
</section>
{% endblock %}
